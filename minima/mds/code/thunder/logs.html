<html>

<head>
	<title>Thunder Cats</title>
	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<!-- Load the main MDS JS lib -->
	<script type="text/javascript" src="./js/mds.js"></script>
	
	<!--  JQUERY CSS + JS -->
	<link rel="stylesheet" href="./jquery/jquery-ui-1.14.1/jquery-ui.css">
	<link rel="stylesheet" href="./jquery/jquery-ui-1.14.1/jquery-ui.icon-font.css">
	<script type="text/javascript" src="./jquery/jquery-3.7.1.min.js"></script>
	<script type="text/javascript" src="./jquery/jquery-ui-1.14.1/jquery-ui.js"></script>
	
	<!-- Load the CSS Style sheet -->
	<link rel="stylesheet" href="style.css">
	
	<!-- And the ICON for the page -->
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	
	<!-- Load the local JS lib -->
	<script type="text/javascript" src="./js/decimal.js"></script>
	<script type="text/javascript" src="./js/jslib.js"></script>
	<script type="text/javascript" src="./js/utils.js"></script>
	<script type="text/javascript" src="./js/sql.js"></script>
		
</head>

<body>

<center>

<div class="titlebar" onclick="showTitleOnAndroid();">
	<table width=100% border=0>
		<tr>
			<td><img height=45 src="./thunderpay.png"></td>
			<td style="text-align:left;font-size:26px;width:100%">&nbsp;<b>Thunder</b></td>
			
			<td class='topicdate' nowrap>
				<button id="button-help">Help</button>
				<button id="button-history">History</button>
				<button id="button-newchannel">New Channel</button>
				<button id="button-home">Home</button>
			</td>
		</tr>
	</table>
</div>
<br>

<div class=blueborder>
		<table id="logstable" style="padding:8;width:100%;word-break:break-all;" border=0></table>	
</div>

<script type="text/javascript">
	
	//Load the default jquery buttons
	$(document).ready(function() {
	    startupButtons();
	});
	
	//Get the HASHID..
	var HASHID = MDS.form.getParams("hashid");
	
	function loadlogs(){
		getLogs(HASHID,function(alllogs){
			
			//Clear table
			logstable.innerHTML = "";
			
			//Cycle through all logs
			for(var i=0;i<alllogs.rows.length;i++){
				var logrow 		= alllogs.rows[i];
				
				var row 		= logstable.insertRow(i);	
				
				if(logrow.TYPE=="FUNDS_SENT"){
					row.style.backgroundColor = "#FFCCCC";	
				
				}else if(logrow.TYPE=="FUNDS_RECEIVED"){
					row.style.backgroundColor = "#CCFFCC";	
				
				}else if(logrow.TYPE=="TRIGGER_ELTOO_FOUND" || logrow.TYPE=="VALID_ELTOO_FOUND"){
					row.style.backgroundColor = "#FFFFCC";	
				
				}else if(logrow.TYPE=="POST_LATEST_UPDATE" || 
						 logrow.TYPE=="POST_FUNDING_TXN" ||
						 logrow.TYPE=="POST_LATEST_SETTLEMENT" ||
						 logrow.TYPE=="POST_CHANNEL_CLOSE_COOP" || 
						 logrow.TYPE=="POST_TRIGGER_CLOSE_CHANNEL"){
					row.style.backgroundColor = "#CCCCFF";	
				
				}else if(logrow.TYPE=="PAYOUT_COIN_FOUND"){
					row.style.backgroundColor = "#DFBFFF";	
				
				}else{
					row.style.backgroundColor = "#EEEEEE";	
				}
								
				var cell 		= row.insertCell(0);
				cell.innerHTML  = "<b>"+logrow.TYPE+"</b><br>"+decodeStringFromDB(logrow.MESSAGE);
				
				var cell2 		 	 = row.insertCell(1);
				cell2.style.whiteSpace = "nowrap";
				cell2.innerHTML  	 = "&nbsp;"+new Date(+logrow.DATE).toLocaleString()+"&nbsp;";	
			}			
		});
	}
	
	//Main message handler..
	MDS.init(function(msg){
		
		//Do initialisation
		if(msg.event == "inited"){
			
			//Do stuff.. from now..		
			loadlogs();
			
		}else if(msg.event == "MDSCOMMS"){
			if(!msg.data.public){
				//Convert the message
				var comms = JSON.parse(msg.data.message);
				
				//Does it refer to this Channel;
				if(comms.hashid == HASHID || comms.hashid == "0x00"){
					logJSON(comms,"COMMS : ");
					loadlogs();	
				}
			}
		}
	});

</script>

</body>

</html>
