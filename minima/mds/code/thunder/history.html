<html>

<head>
	<title>Thunder Cats</title>
	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<!-- Load the main MDS JS lib -->
	<script type="text/javascript" src="./js/mds.js"></script>
	
	<!--  JQUERY CSS + JS -->
	<link rel="stylesheet" href="./jquery/jquery-ui-1.14.1/jquery-ui.css">
	<link rel="stylesheet" href="./jquery/jquery-ui-1.14.1/jquery-ui.icon-font.css">
	<script type="text/javascript" src="./jquery/jquery-3.7.1.min.js"></script>
	<script type="text/javascript" src="./jquery/jquery-ui-1.14.1/jquery-ui.js"></script>
	
	<!-- Load the CSS Style sheet -->
	<link rel="stylesheet" href="style.css">
	
	<!-- And the ICON for the page -->
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	
	<!-- Load the local JS lib -->
	<script type="text/javascript" src="./js/decimal.js"></script>
	<script type="text/javascript" src="./js/jslib.js"></script>
	<script type="text/javascript" src="./js/utils.js"></script>
	<script type="text/javascript" src="./js/sql.js"></script>
	<script type="text/javascript" src="./js/txns.js"></script>
		
</head>

<body>

<center>

<div class="titlebar" onclick="showTitleOnAndroid();">
	<table width=100% border=0>
		<tr>
			<td><img height=45 src="./thunderpay.png"></td>
			<td style="text-align:left;font-size:26px;width:100%">&nbsp;<b>Thunder</b></td>
			
			<td class='topicdate' nowrap>
				<button id="button-help">Help</button>
				<button id="button-history">History</button>
				<button id="button-newchannel">New Channel</button>
				<button id="button-home">Home</button>
			</td>
		</tr>
	</table>
</div>

<br>

<div id="channelview" style="font-size:12;text-align:left;max-width:840;">
	
</div>

<br>
<button id="button-clear-history">Clear All History</button>

<script type="text/javascript">
	
	var MAXIMA_CONTACTS 	= [];
	function getContactFromPublicKey(pubkey){
		for(var i=0;i<MAXIMA_CONTACTS.length;i++){
			var contact = MAXIMA_CONTACTS[i];
			if(contact.publickey == pubkey){
				return contact.extradata.name; 
			}
		}
		return "NOT FOUND";
	}
	
	//Load the default jquery buttons
	$(document).ready(function() {
	    startupButtons();
		
		$( "#button-clear-history" ).button({
			icon: "ui-icon-delete",
			showLabel: true
		}).click(function(){clearHistory();});
		
	});
	
	function clearHistory(){
		if(confirm("Are you sure you want to delete History ?")){
			
			//First load all closed channels
			sqlSelectAllClosedChannels(function(sqlres){
				
				//Now delete all the scripts..
				for(var i=0;i<sqlres.count;i++){
					
					var row = sqlres.rows[i];
					
					//Remove the scripts..
					removeScript(row.FUNDINGADDRESS);
					removeScript(row.ELTOOADDRESS);
				}
				
				//And delete all channels
				sqlDeleteAllClosedChannels(function(){
					//And reload..
					loadHistory();
				});
			});
		}
	}
	
	function showLogs(hashid){
		location.href="logs.html?uid="+MDS.minidappuid+"&hashid="+hashid;
	}
	
	function createRow(channeldata){
			
		//Which user are we..
		var counterpartymaximaid = "";
		var totalamount = channeldata.TOTALAMOUNT;
		var myamount = "";
		
		if(channeldata.USERNUM == "1"){
			counterpartymaximaid = channeldata.USER2MAXIMAID;
			myamount			 = channeldata.USER1AMOUNT;
		}else{
			counterpartymaximaid = channeldata.USER1MAXIMAID
			myamount			 = channeldata.USER2AMOUNT;
		}
		
		//How much is left..
		//var remainder = new Decimal(totalamount).sub(new Decimal(myamount)).toString();
		
		//Convert Datetime
		var date = new Date(+channeldata.DATE);
		
		//Button id
		var cancelid = "";
		
		//The view
		var ret ="		<div class=channelrow>"
			+"<table border=0 style='width:100%;padding-left:10;padding-right:10;''>"
				+"<tr>"
					+"<td class='largeboldtext'>"+getContactFromPublicKey(counterpartymaximaid)+"</td>"
					+"<td class='alignright'> <b>"+decodeStringFromDB(channeldata.TOKENNAME)+"</b>&nbsp;:&nbsp;&nbsp;<span class='largeboldtext'>"+myamount+"</span> / "+totalamount+"</td>"	
				+"</tr>"	
				+"<tr>"
					+"<td>&nbsp;</td>"
					//+"<td class='smallgreytext'>[ "+channeldata.STATE+" ]</td>"	
				+"</tr>";
				
		//Add buttons..
		ret+="<tr>"
			+"<td>&nbsp;</td>"
			+"<td class='alignright'><button class='mybtn' onclick='showLogs(\""+channeldata.HASHID+"\");'>LOGS</button></td>"		
		+"</tr>"
				
		//And clean up
		ret+="</table></div>";
		
		return ret;
	}
	
	function loadHistory(){
		sqlSelectAllClosedChannels(function(allchannels){
			
			var output = "";
			
			var length = allchannels.rows.length;
			for(var i=0;i<length;i++){
				var row = createRow(allchannels.rows[i]);
				output += row+"<br>"
			}
				
			channelview.innerHTML = output;
		});	
	}
	
	//Main message handler..
	MDS.init(function(msg){
		
		//Do initialisation
		if(msg.event == "inited"){
			
			//Get maxcontact details
			MDS.cmd("maxcontacts",function(maxcont){
				MAXIMA_CONTACTS = maxcont.response.contacts;
				loadHistory();
			});
		}					
	});

</script>

</body>

</html>
